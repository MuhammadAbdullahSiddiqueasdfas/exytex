<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Floating Code Elements -->
  <g opacity="0.6">
    <!-- Browser Window -->
    <rect x="400" y="200" width="600" height="400" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <rect x="400" y="200" width="600" height="40" rx="12" fill="rgba(255,255,255,0.15)"/>
    <circle cx="425" cy="220" r="6" fill="#ff5f57"/>
    <circle cx="445" cy="220" r="6" fill="#ffbd2e"/>
    <circle cx="465" cy="220" r="6" fill="#28ca42"/>
    
    <!-- Code Lines -->
    <rect x="420" y="260" width="200" height="8" rx="4" fill="url(#codeGradient)">
      <animate attributeName="width" values="200;300;200" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="420" y="280" width="350" height="8" rx="4" fill="url(#codeGradient)">
      <animate attributeName="width" values="350;250;350" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="420" y="300" width="150" height="8" rx="4" fill="url(#codeGradient)">
      <animate attributeName="width" values="150;400;150" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="420" y="320" width="280" height="8" rx="4" fill="url(#codeGradient)">
      <animate attributeName="width" values="280;180;280" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Floating Geometric Shapes -->
  <g opacity="0.4">
    <circle cx="200" cy="300" r="40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 200 300;360 200 300" dur="20s" repeatCount="indefinite"/>
    </circle>
    <rect x="1400" y="400" width="60" height="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" transform="rotate(45 1430 430)">
      <animateTransform attributeName="transform" type="rotate" values="45 1430 430;405 1430 430" dur="15s" repeatCount="indefinite"/>
    </rect>
    <polygon points="300,800 350,750 400,800 350,850" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 350 800;360 350 800" dur="12s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Particle Effects -->
  <g opacity="0.3">
    <circle cx="100" cy="100" r="3" fill="rgba(255,255,255,0.6)">
      <animate attributeName="cy" values="100;1000;100" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="50" r="2" fill="rgba(96,165,250,0.8)">
      <animate attributeName="cy" values="50;1050;50" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="0" r="4" fill="rgba(167,139,250,0.6)">
      <animate attributeName="cy" values="0;1080;0" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Tech Stack Icons -->
  <g opacity="0.5">
    <!-- React Icon -->
    <g transform="translate(1200, 200)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="rgba(97,218,251,0.8)" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="rgba(97,218,251,0.6)" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="rgba(97,218,251,0.6)" stroke-width="1.5" transform="rotate(60)">
        <animateTransform attributeName="transform" type="rotate" values="60;420" dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="rgba(97,218,251,0.6)" stroke-width="1.5" transform="rotate(120)">
        <animateTransform attributeName="transform" type="rotate" values="120;480" dur="6s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>
</svg>