<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  
  <!-- Animated particles -->
  <circle cx="100" cy="100" r="3" fill="rgba(255,255,255,0.3)">
    <animate attributeName="cy" values="100;50;100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="350" r="2" fill="rgba(255,255,255,0.4)">
    <animate attributeName="cy" values="350;300;350" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="400" r="2.5" fill="rgba(255,255,255,0.2)">
    <animate attributeName="cy" values="400;360;400" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main content area -->
  <rect x="150" y="100" width="500" height="250" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Insurance building icon -->
  <g transform="translate(350, 150)">
    <!-- Building base -->
    <rect x="0" y="40" width="100" height="80" fill="rgba(255,255,255,0.8)" rx="5">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Building columns -->
    <rect x="10" y="20" width="8" height="100" fill="rgba(255,255,255,0.9)"/>
    <rect x="25" y="20" width="8" height="100" fill="rgba(255,255,255,0.9)"/>
    <rect x="40" y="20" width="8" height="100" fill="rgba(255,255,255,0.9)"/>
    <rect x="55" y="20" width="8" height="100" fill="rgba(255,255,255,0.9)"/>
    <rect x="70" y="20" width="8" height="100" fill="rgba(255,255,255,0.9)"/>
    <rect x="85" y="20" width="8" height="100" fill="rgba(255,255,255,0.9)"/>
    
    <!-- Roof -->
    <polygon points="50,0 0,20 100,20" fill="rgba(255,255,255,0.9)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- Windows -->
    <rect x="15" y="50" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="30" y="50" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="45" y="50" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="60" y="50" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="75" y="50" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    
    <rect x="15" y="70" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="30" y="70" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="45" y="70" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="60" y="70" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="75" y="70" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    
    <rect x="15" y="90" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="30" y="90" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="45" y="90" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="60" y="90" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
    <rect x="75" y="90" width="6" height="8" fill="rgba(37,99,235,0.6)"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="280" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    Insurance Technology
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="310" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="16">
    Transforming Insurance Operations
  </text>
  
  <!-- Data flow lines -->
  <line x1="50" y1="225" x2="150" y2="225" stroke="rgba(255,255,255,0.4)" stroke-width="2">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="650" y1="225" x2="750" y2="225" stroke="rgba(255,255,255,0.4)" stroke-width="2">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite" begin="1s"/>
  </line>
  
  <!-- Data nodes -->
  <circle cx="50" cy="225" r="8" fill="rgba(255,255,255,0.6)">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="225" r="8" fill="rgba(255,255,255,0.6)">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>