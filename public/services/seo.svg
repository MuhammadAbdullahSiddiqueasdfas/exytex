<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="seoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6BCF7F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#seoGradient)"/>
  <g transform="translate(150, 100)">
    <!-- Magnifying glass -->
    <circle cx="40" cy="40" r="30" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>
    <line x1="62" y1="62" x2="85" y2="85" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <!-- Search results -->
    <rect x="-50" y="90" width="80" height="8" rx="4" fill="white" opacity="0.7"/>
    <rect x="-50" y="105" width="60" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="-50" y="120" width="70" height="6" rx="3" fill="white" opacity="0.5"/>
  </g>
  <!-- SEO text -->
  <text x="50" y="250" font-family="system-ui" font-size="18" fill="white" opacity="0.7">SEO</text>
  <text x="320" y="50" font-family="monospace" font-size="16" fill="white" opacity="0.6">#1</text>
</svg>