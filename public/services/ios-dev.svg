<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iosGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#iosGradient)"/>
  <g transform="translate(150, 50)">
    <!-- iPhone outline -->
    <rect x="0" y="0" width="100" height="180" rx="20" ry="20" fill="white" opacity="0.9" stroke="white" stroke-width="2"/>
    <!-- Screen -->
    <rect x="10" y="25" width="80" height="130" rx="8" ry="8" fill="#007AFF" opacity="0.3"/>
    <!-- Home indicator -->
    <rect x="35" y="165" width="30" height="4" rx="2" fill="#007AFF" opacity="0.6"/>
    <!-- App icons grid -->
    <g opacity="0.7">
      <rect x="20" y="35" width="15" height="15" rx="3" fill="white"/>
      <rect x="40" y="35" width="15" height="15" rx="3" fill="white"/>
      <rect x="60" y="35" width="15" height="15" rx="3" fill="white"/>
      <rect x="20" y="55" width="15" height="15" rx="3" fill="white"/>
      <rect x="40" y="55" width="15" height="15" rx="3" fill="white"/>
      <rect x="60" y="55" width="15" height="15" rx="3" fill="white"/>
    </g>
  </g>
  <!-- Swift logo -->
  <text x="50" y="250" font-family="system-ui" font-size="20" fill="white" opacity="0.7">Swift</text>
  <text x="320" y="50" font-family="monospace" font-size="18" fill="white" opacity="0.6">{ }</text>
</svg>