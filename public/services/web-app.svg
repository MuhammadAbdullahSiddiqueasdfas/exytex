<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="webappGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6CF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88D8C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#webappGradient)"/>
  <g transform="translate(75, 50)">
    <!-- Laptop -->
    <rect x="0" y="0" width="250" height="160" rx="8" fill="white" opacity="0.9"/>
    <!-- Screen -->
    <rect x="15" y="15" width="220" height="130" rx="4" fill="#A8E6CF" opacity="0.3"/>
    <!-- Keyboard base -->
    <rect x="-20" y="160" width="290" height="20" rx="10" fill="white" opacity="0.8"/>
    <!-- App interface mockup -->
    <rect x="25" y="25" width="200" height="20" rx="4" fill="white" opacity="0.8"/>
    <rect x="25" y="55" width="90" height="60" rx="4" fill="white" opacity="0.6"/>
    <rect x="125" y="55" width="100" height="25" rx="4" fill="white" opacity="0.6"/>
    <rect x="125" y="90" width="100" height="25" rx="4" fill="white" opacity="0.6"/>
    <rect x="25" y="125" width="200" height="15" rx="4" fill="white" opacity="0.6"/>
  </g>
  <!-- React/JS symbols -->
  <text x="50" y="250" font-family="monospace" font-size="18" fill="white" opacity="0.7">React</text>
  <text x="320" y="50" font-family="monospace" font-size="16" fill="white" opacity="0.6">JS</text>
</svg>