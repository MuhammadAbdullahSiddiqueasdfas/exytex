<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="webGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#webGradient)"/>
  <g transform="translate(100, 75)">
    <!-- Browser window -->
    <rect x="0" y="0" width="200" height="150" rx="8" fill="white" opacity="0.9"/>
    <!-- Browser header -->
    <rect x="0" y="0" width="200" height="30" rx="8" fill="white"/>
    <rect x="0" y="22" width="200" height="8" fill="#f0f0f0"/>
    <!-- Traffic lights -->
    <circle cx="15" cy="15" r="4" fill="#FF5F57"/>
    <circle cx="30" cy="15" r="4" fill="#FFBD2E"/>
    <circle cx="45" cy="15" r="4" fill="#28CA42"/>
    <!-- Code content -->
    <rect x="10" y="40" width="80" height="4" rx="2" fill="#FF6B6B" opacity="0.6"/>
    <rect x="10" y="50" width="120" height="4" rx="2" fill="#4ECDC4" opacity="0.6"/>
    <rect x="10" y="60" width="60" height="4" rx="2" fill="#FF6B6B" opacity="0.6"/>
    <rect x="10" y="70" width="100" height="4" rx="2" fill="#4ECDC4" opacity="0.6"/>
    <rect x="10" y="80" width="140" height="4" rx="2" fill="#FF6B6B" opacity="0.6"/>
  </g>
  <!-- HTML tags -->
  <text x="50" y="250" font-family="monospace" font-size="18" fill="white" opacity="0.7">&lt;html&gt;</text>
  <text x="300" y="50" font-family="monospace" font-size="16" fill="white" opacity="0.6">CSS</text>
</svg>