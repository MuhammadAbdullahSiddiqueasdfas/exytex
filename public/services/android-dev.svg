<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="androidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DDC84;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4285F4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#androidGradient)"/>
  <g transform="translate(150, 75)">
    <!-- Android Robot -->
    <path d="M50 0C22.4 0 0 22.4 0 50v50c0 27.6 22.4 50 50 50s50-22.4 50-50V50c0-27.6-22.4-50-50-50z" fill="white" opacity="0.9"/>
    <!-- Eyes -->
    <circle cx="35" cy="40" r="4" fill="#3DDC84"/>
    <circle cx="65" cy="40" r="4" fill="#3DDC84"/>
    <!-- Antennae -->
    <line x1="25" y1="15" x2="20" y2="5" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="75" y1="15" x2="80" y2="5" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Arms -->
    <rect x="10" y="60" width="8" height="30" rx="4" fill="white" opacity="0.9"/>
    <rect x="82" y="60" width="8" height="30" rx="4" fill="white" opacity="0.9"/>
    <!-- Legs -->
    <rect x="30" y="120" width="8" height="25" rx="4" fill="white" opacity="0.9"/>
    <rect x="62" y="120" width="8" height="25" rx="4" fill="white" opacity="0.9"/>
  </g>
  <!-- Code brackets -->
  <text x="50" y="250" font-family="monospace" font-size="24" fill="white" opacity="0.7">&lt;/&gt;</text>
  <text x="320" y="50" font-family="monospace" font-size="18" fill="white" opacity="0.6">{ }</text>
</svg>