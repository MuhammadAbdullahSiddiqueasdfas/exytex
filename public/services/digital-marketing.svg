<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="marketingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F43F5E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#marketingGradient)"/>
  <g transform="translate(150, 75)">
    <!-- Megaphone -->
    <path d="M20 40 L60 30 L80 35 L80 55 L60 60 L20 50 Z" fill="white" opacity="0.9"/>
    <circle cx="85" cy="45" r="8" fill="white" opacity="0.9"/>
    <path d="M15 35 L25 35 L25 55 L15 55 Q10 55 10 50 L10 40 Q10 35 15 35 Z" fill="white" opacity="0.9"/>
    
    <!-- Sound waves -->
    <path d="M95 35 Q105 40 105 45 Q105 50 95 55" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M105 30 Q120 35 120 45 Q120 55 105 60" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M115 25 Q135 30 135 45 Q135 60 115 65" stroke="white" stroke-width="3" fill="none" opacity="0.5"/>
    
    <!-- Social media icons -->
    <circle cx="30" cy="90" r="12" fill="white" opacity="0.8"/>
    <text x="30" y="95" font-family="Arial" font-size="10" fill="#EC4899" text-anchor="middle">f</text>
    
    <rect x="50" y="78" width="24" height="24" rx="4" fill="white" opacity="0.8"/>
    <circle cx="62" cy="90" r="6" fill="#EC4899"/>
    
    <circle cx="85" cy="90" r="12" fill="white" opacity="0.8"/>
    <text x="85" y="95" font-family="Arial" font-size="8" fill="#EC4899" text-anchor="middle">in</text>
  </g>
  
  <!-- Growth chart -->
  <g transform="translate(50, 180)">
    <polyline points="0,40 20,35 40,25 60,15 80,10" stroke="white" stroke-width="3" fill="none" opacity="0.8"/>
    <circle cx="0" cy="40" r="3" fill="white"/>
    <circle cx="20" cy="35" r="3" fill="white"/>
    <circle cx="40" cy="25" r="3" fill="white"/>
    <circle cx="60" cy="15" r="3" fill="white"/>
    <circle cx="80" cy="10" r="3" fill="white"/>
  </g>
  
  <!-- Marketing text -->
  <text x="50" y="250" font-family="system-ui" font-size="16" fill="white" opacity="0.7">Digital</text>
  <text x="320" y="50" font-family="system-ui" font-size="14" fill="white" opacity="0.6">ROI</text>
</svg>