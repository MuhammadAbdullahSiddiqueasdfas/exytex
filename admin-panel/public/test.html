<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - EXYTEX</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e293b;
            color: #fff;
        }
        .container {
            background: #334155;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #3b82f6; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #2563eb; }
        .log {
            background: #1e293b;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 EXYTEX Login Test</h1>
        <p>This page tests the login functionality directly.</p>
        
        <div>
            <input type="text" id="username" placeholder="Username" value="admin">
            <input type="password" id="password" placeholder="Password" value="admin123">
        </div>
        
        <button onclick="testTempLogin()">Test Temporary Login</button>
        <button onclick="testRegularLogin()">Test Regular Login</button>
        <button onclick="testVerify()">Test Token Verify</button>
        <button onclick="clearLogs()">Clear Logs</button>
        <button onclick="clearToken()">Clear Token</button>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            logDiv.innerHTML += `<div class="${className}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('log').innerHTML = '';
        }
        
        function clearToken() {
            localStorage.removeItem('adminToken');
            log('✅ Token cleared from localStorage', 'success');
        }
        
        async function testTempLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            log(`🔐 Testing temporary login with: ${username}`, 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login-temp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    log('✅ Temporary login successful!', 'success');
                    log(`Token: ${data.token.substring(0, 50)}...`, 'info');
                    log(`Admin: ${JSON.stringify(data.admin)}`, 'info');
                    localStorage.setItem('adminToken', data.token);
                    log('💾 Token saved to localStorage', 'success');
                } else {
                    log(`❌ Login failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function testRegularLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            log(`🔐 Testing regular login with: ${username}`, 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    log('✅ Regular login successful!', 'success');
                    log(`Token: ${data.token.substring(0, 50)}...`, 'info');
                    log(`Admin: ${JSON.stringify(data.admin)}`, 'info');
                    localStorage.setItem('adminToken', data.token);
                    log('💾 Token saved to localStorage', 'success');
                } else {
                    log(`❌ Login failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function testVerify() {
            const token = localStorage.getItem('adminToken');
            
            if (!token) {
                log('❌ No token found in localStorage', 'error');
                return;
            }
            
            log('🔍 Testing token verification...', 'info');
            log(`Token: ${token.substring(0, 50)}...`, 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/verify`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    log('✅ Token verification successful!', 'success');
                    log(`Admin: ${JSON.stringify(data.admin)}`, 'info');
                } else {
                    log(`❌ Token verification failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        // Auto-check on load
        window.onload = () => {
            log('🚀 Login test page loaded', 'info');
            const token = localStorage.getItem('adminToken');
            if (token) {
                log('🔑 Found existing token in localStorage', 'info');
            } else {
                log('ℹ️ No token found in localStorage', 'info');
            }
        };
    </script>
</body>
</html>
